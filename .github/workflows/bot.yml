name: YouTube Telegram Bot

on:
  schedule:
    - cron: "*/15 * * * *"  # هر 15 دقیقه
  workflow_dispatch:  # اجرا دستی هم داشته باشیم

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install yt-dlp system dependency
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python bot.py
